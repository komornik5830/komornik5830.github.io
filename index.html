function pokazPunktyKlikniecia(x, y, ilosc) {
    const efekt = document.createElement("div");
    efekt.classList.add("punktEfekt");
    efekt.textContent = "+" + ilosc;
    document.body.appendChild(efekt);

    efekt.style.left = x + "px";
    efekt.style.top = y + "px";

    setTimeout(() => {
        efekt.style.transform = "translateY(-50px)";
        efekt.style.opacity = "0";
    }, 10);

    setTimeout(() => efekt.remove(), 1000);
}

function klik(event) {
    let punktyNaKlik = klikx2Kupione ? 2 : 1;
    punkty += punktyNaKlik;
    klikAktualne += 1;

    let postac = document.getElementById("postac");
    postac.textContent = otwarta;
    postac.style.color = aktualnyKolor;

    setTimeout(() => {
        postac.textContent = zamknieta;
        postac.style.color = aktualnyKolor;
    }, 150);

    pokazPunktyKlikniecia(event.pageX, event.pageY, punktyNaKlik);

    if (klikAktualne >= klikDoNastepnego) {
        poziom += 1;
        klikAktualne = 0;
        klikDoNastepnego += 2;
        punkty += 1;
    }

    document.getElementById("punkty").textContent = "Punkty: " + punkty;
    document.getElementById("poziom").textContent =
        "Poziom kota: " + poziom + " (" + klikAktualne + "/" + klikDoNastepnego + " klikniДҷДҮ)";
}

document.getElementById("postac").onclick = klik;

document.getElementById("autoBtn").onclick = function() {
    if (!autoKupione && punkty >= 100) {
        punkty -= 100;
        autoKupione = true;
        this.textContent = "Zakupiono";
        document.getElementById("punkty").textContent = "Punkty: " + punkty;

        setInterval(() => {
            punkty += 2;
            document.getElementById("punkty").textContent = "Punkty: " + punkty;
        }, 5000);
    }
}

document.getElementById("clickBtn").onclick = function() {

    }
}

        aktualnyKolor = "red";

        document.getElementById("punkty").textContent = "Punkty: " + punkty;

}
